<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RH · Almacén CEDIS Panamá</title>
<link rel="icon" href="./favicon.ico">
<style>
:root{
  --navy:#0B1F3A; --blue:#0C447C; --blue-soft:#e8f0fa;
  --line:#c9d2dd; --line-soft:#e6ebf1;
  --bg:#f2f4f7; --white:#fff;
  --text:#1b2430; --muted:#6b7785;
  --ok:#166534; --ok-bg:#dcfce7;
  --warn:#92400e; --warn-bg:#fef3c7;
  --bad:#991b1b; --bad-bg:#fee2e2;
  --ff:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;
  --mono:'Consolas','SF Mono',monospace;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:var(--ff);color:var(--text);font-size:14px}

/* ── Barra superior ── */
.top{background:var(--navy);color:#fff;padding:11px 20px;display:flex;align-items:center;gap:14px;
     position:sticky;top:0;z-index:60;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.top img{width:36px;height:36px;background:#fff;border-radius:50%;padding:2px}
.top-t{font-size:15.5px;font-weight:700;line-height:1.2}
.top-s{font-size:11px;color:#b9c7d9;letter-spacing:.3px}
.top-r{margin-left:auto;font-family:var(--mono);font-size:12px;color:#b9c7d9}

/* ── Selector de contexto (persona + ciclo) ── */
.ctx{background:var(--white);border-bottom:1px solid var(--line);padding:14px 20px;
     position:sticky;top:58px;z-index:55}
.ctx-in{max-width:1180px;margin:0 auto}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
select,input[type=date]{border:1px solid var(--line);border-radius:6px;padding:8px 10px;
       font-family:inherit;font-size:13.5px;background:var(--white);color:var(--text);min-width:160px}
select:focus,input:focus{outline:2px solid var(--blue);outline-offset:-1px}
.grow{flex:1;min-width:230px}
.grow select{width:100%}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.chip{border:1px solid var(--line);background:var(--white);border-radius:20px;padding:5px 13px;
      font-size:12px;cursor:pointer;font-family:inherit;color:var(--muted)}
.chip:hover{border-color:var(--blue);color:var(--navy)}
.chip.on{background:var(--blue-soft);border-color:var(--blue);color:var(--navy);font-weight:700}

.btn{border:none;border-radius:6px;padding:9px 18px;font-family:inherit;font-size:13.5px;
     font-weight:700;cursor:pointer;white-space:nowrap}
.btn-main{background:var(--blue);color:#fff}
.btn-main:hover{background:var(--navy)}
.btn-2{background:var(--white);color:var(--navy);border:1px solid var(--line)}
.btn-2:hover{border-color:var(--blue)}
.btn:disabled{opacity:.5;cursor:default}

/* ── Secciones ── */
.secs{background:var(--white);border-bottom:1px solid var(--line);padding:0 20px;
      position:sticky;top:135px;z-index:50;overflow-x:auto}
.secs-in{max-width:1180px;margin:0 auto;display:flex;gap:2px}
.secs button{background:none;border:none;padding:12px 18px;font-family:inherit;font-size:13.5px;
             font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;
             white-space:nowrap;display:flex;align-items:center;gap:7px}
.secs button:hover{color:var(--navy)}
.secs button.on{color:var(--navy);border-bottom-color:var(--blue);background:var(--blue-soft)}
.badge{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:20px;
       background:var(--warn-bg);color:var(--warn);letter-spacing:.2px}

.wrap{max-width:1180px;margin:0 auto;padding:20px}
.sec{display:none}
.sec.on{display:block}

/* ── Panel ── */
.panel{background:var(--white);border:1px solid var(--line);border-radius:8px;margin-bottom:16px;
       box-shadow:0 1px 3px rgba(11,31,58,.06)}
.panel-h{padding:12px 16px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;
         justify-content:space-between;gap:12px;flex-wrap:wrap}
.panel-t{font-size:14px;font-weight:700;color:var(--navy)}
.panel-b{padding:16px}

/* ── KPIs ── */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:13px 15px;
     box-shadow:0 1px 3px rgba(11,31,58,.06)}
.kpi-l{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kpi-v{font-size:24px;font-weight:700;color:var(--navy);font-family:var(--mono);margin-top:3px}
.kpi-s{font-size:11.5px;color:var(--muted)}

/* ── Tabla ── */
table{width:100%;border-collapse:collapse}
th,td{border:1px solid var(--line-soft);padding:7px 9px;font-size:13px;text-align:center}
th{background:#f7f9fc;font-weight:700;color:var(--navy);font-size:11.5px;
   text-transform:uppercase;letter-spacing:.3px}
td.l{text-align:left}
td.num{font-family:var(--mono)}
tr.doble td{background:#fffbeb}
tr.apertura td{background:#f7f9fc;font-style:italic;color:var(--muted)}
tfoot td{background:#f7f9fc;font-weight:700}

.msg{padding:26px;text-align:center;color:var(--muted);font-size:13px}
.msg.err{color:var(--bad)}
.spin{display:inline-block;width:15px;height:15px;border:2px solid var(--line);
      border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}

.lote-item{display:flex;align-items:center;justify-content:space-between;gap:12px;
           padding:10px 14px;border-bottom:1px solid var(--line-soft)}
.lote-item:last-child{border-bottom:none}
.lote-n{font-weight:600}
.lote-d{font-size:11.5px;color:var(--muted)}
.lote-t{font-family:var(--mono);font-weight:700;color:var(--navy)}

.aviso{background:var(--blue-soft);border:1px solid #bfd4ee;border-radius:6px;
       padding:10px 14px;font-size:12.5px;color:var(--navy);margin-bottom:14px}

.modo{display:flex;gap:6px;margin-bottom:14px}
.modo button{border:1px solid var(--line);background:var(--white);border-radius:6px;padding:7px 15px;
             font-family:inherit;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer}
.modo button.on{background:var(--navy);color:#fff;border-color:var(--navy)}

@media(max-width:640px){
  .ctx{top:56px;padding:12px}
  .secs{top:auto;position:static}
  .wrap{padding:12px}
  th,td{padding:5px 6px;font-size:12px}
}
</style>
</head>
<body>

<div class="top">
  <img src="./icons/icon-192.png" alt="CSS">
  <div>
    <div class="top-t">Recursos Humanos · Almacén CEDIS Panamá</div>
    <div class="top-s">DIRECCIÓN NACIONAL DE LOGÍSTICA</div>
  </div>
  <div class="top-r" id="reloj"></div>
</div>

<!-- Contexto: a quién y de qué ciclo -->
<div class="ctx">
  <div class="ctx-in">
    <div class="modo">
      <button class="on" id="m-uno" onclick="setModo('uno')">Un colaborador</button>
      <button id="m-area" onclick="setModo('area')">Un área completa</button>
    </div>
    <div class="row">
      <div class="fld grow" id="box-emp">
        <label for="sel-emp">Colaborador</label>
        <select id="sel-emp"><option value="">Cargando personal…</option></select>
      </div>
      <div class="fld grow" id="box-area" style="display:none">
        <label for="sel-area">Área</label>
        <select id="sel-area"><option value="">Cargando áreas…</option></select>
      </div>
      <div class="fld">
        <label for="f-desde">Desde</label>
        <input type="date" id="f-desde">
      </div>
      <div class="fld">
        <label for="f-hasta">Hasta</label>
        <input type="date" id="f-hasta">
      </div>
      <button class="btn btn-main" onclick="consultar()">Consultar</button>
    </div>
    <div class="chips" id="chips"></div>
  </div>
</div>

<!-- Secciones -->
<nav class="secs">
  <div class="secs-in">
    <button class="on" id="s-via" onclick="verSec('via')">Alimentación y transporte</button>
    <button id="s-txt" onclick="verSec('txt')">Tiempo compensatorio</button>
    <button id="s-vac" onclick="verSec('vac')">Vacaciones <span class="badge">pendiente</span></button>
    <button id="s-inc" onclick="verSec('inc')">Incidencias <span class="badge">pendiente</span></button>
  </div>
</nav>

<div class="wrap">
  <div class="sec on" id="sec-via">
    <div id="res-via"></div>
  </div>

  <div class="sec" id="sec-txt">
    <div id="res-txt"><div class="panel"><div class="msg">
      Selecciona un colaborador y pulsa <strong>Consultar</strong>.
    </div></div></div>
    <div id="res-art18"></div>
  </div>

  <div class="sec" id="sec-vac">
    <div class="panel"><div class="msg">
      El detalle de vacaciones por resolución se conecta en la próxima entrega.
    </div></div>
  </div>

  <div class="sec" id="sec-inc">
    <div class="panel"><div class="msg">
      El registro de ausencias, tardanzas y artículos se conecta en la próxima entrega.
    </div></div>
  </div>
</div>

<script>
const GAS   = "https://script.google.com/macros/s/AKfycby_lXwc1VIzyj5qV2kxaZBzhiBiHQ3wPbRG3raRov_Ij2lFEtBnqTGb_1DmCglx37V_/exec";
const TOKEN = "RH_DINALOG";

let MODO='uno';          // 'uno' | 'area'
let EMP_ACTUAL='';       // colaborador consultado
let ULTIMA=null;         // {modo, valor, desde, hasta}

/* ── Reloj ── */
function reloj(){
  const d=new Date();
  document.getElementById('reloj').textContent =
    d.toLocaleDateString('es-PA',{day:'2-digit',month:'2-digit',year:'2-digit'})+' · '+
    d.toLocaleTimeString('es-PA',{hour:'2-digit',minute:'2-digit'});
}
setInterval(reloj,30000); reloj();

/* ── Modo: un colaborador o un área ── */
function setModo(m){
  MODO=m;
  document.getElementById('m-uno').classList.toggle('on', m==='uno');
  document.getElementById('m-area').classList.toggle('on', m==='area');
  document.getElementById('box-emp').style.display  = (m==='uno')  ? '' : 'none';
  document.getElementById('box-area').style.display = (m==='area') ? '' : 'none';
}

/* ── Secciones ── */
function verSec(s){
  ['via','txt','vac','inc'].forEach(x=>{
    document.getElementById('sec-'+x).classList.toggle('on', x===s);
    document.getElementById('s-'+x).classList.toggle('on', x===s);
  });
}

/* ── Ciclos 16→15 ── */
function iso(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function ciclos(n){
  const out=[]; const hoy=new Date();
  let y=hoy.getFullYear(), m=hoy.getMonth();
  if(hoy.getDate()<16) m--;
  for(let i=0;i<n;i++){
    const ini=new Date(y,m-i,16), fin=new Date(y,m-i+1,15);
    out.push({desde:iso(ini), hasta:iso(fin),
      etiqueta: ini.toLocaleDateString('es-PA',{month:'short'}).replace('.','')+' 16 – '+
                fin.toLocaleDateString('es-PA',{month:'short'}).replace('.','')+' 15'});
  }
  return out;
}
function pintarChips(){
  const cont=document.getElementById('chips'), cs=ciclos(6);
  cont.innerHTML=cs.map((c,i)=>
    `<button class="chip${i===0?' on':''}" data-d="${c.desde}" data-h="${c.hasta}">${c.etiqueta}</button>`).join('');
  cont.querySelectorAll('.chip').forEach(b=>{
    b.onclick=()=>{
      cont.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      document.getElementById('f-desde').value=b.dataset.d;
      document.getElementById('f-hasta').value=b.dataset.h;
    };
  });
  document.getElementById('f-desde').value=cs[0].desde;
  document.getElementById('f-hasta').value=cs[0].hasta;
}

/* ── Catálogos ── */
// Si el backend no responde con lo esperado, se muestra el motivo en pantalla
// en vez de dejar el desplegable vacío sin explicación.
function avisoConexion(txt){
  let el=document.getElementById('aviso-conn');
  if(!el){
    el=document.createElement('div');
    el.id='aviso-conn';
    el.style.cssText='background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;'+
      'padding:10px 14px;border-radius:6px;font-size:12.5px;margin-top:10px';
    document.querySelector('.ctx-in').appendChild(el);
  }
  el.textContent=txt;
}

async function cargarPersonal(){
  const sel=document.getElementById('sel-emp');
  try{
    const r=await fetch(`${GAS}?action=meta&token=${TOKEN}&_=${Date.now()}`);
    const d=await r.json();
    let emps = d.employees || d.empleados || d.personal || [];
    emps = emps.filter(e=>e && String(e).trim() && String(e).toUpperCase()!=='TODOS')
               .map(String).sort();
    if(!emps.length){
      sel.innerHTML='<option value="">Sin personal disponible</option>';
      avisoConexion('El servidor respondió pero no devolvió personal. Verifica que MATRIZ_ALIAS tenga registros activos.');
      return;
    }
    sel.innerHTML='<option value="">Selecciona un colaborador…</option>'+
      emps.map(e=>`<option value="${e}">${e}</option>`).join('');
  }catch(e){
    sel.innerHTML='<option value="">No se pudo cargar el personal</option>';
    avisoConexion('No se pudo conectar con el servidor. Revisa que el script esté desplegado y que la dirección del despliegue coincida con la de esta página.');
  }
}
async function cargarAreas(){
  const sel=document.getElementById('sel-area');
  try{
    const r=await fetch(`${GAS}?action=areas&token=${TOKEN}&_=${Date.now()}`);
    const d=await r.json();
    const as=d.areas||[];
    if(!as.length){
      sel.innerHTML='<option value="">Sin áreas disponibles</option>';
      return;
    }
    sel.innerHTML='<option value="">Selecciona un área…</option>'+
      as.map(a=>`<option value="${a.area}">${a.area} (${a.personal})</option>`).join('');
  }catch(e){
    sel.innerHTML='<option value="">No se pudieron cargar las áreas</option>';
  }
}

/* ── Formatos ── */
const money  = n => 'B/. '+Number(n||0).toFixed(2);
const fFecha = ymd => { const p=String(ymd||'').split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:ymd; };
const fHora  = h => { const m=String(h||'').match(/^(\d{1,2}):(\d{2})/); return m?`${+m[1]}:${m[2]}`:(h||''); };

/* ── Consultar (según modo) ── */
function consultar(){
  const desde=document.getElementById('f-desde').value;
  const hasta=document.getElementById('f-hasta').value;
  const cont=document.getElementById('res-via');
  if(!desde||!hasta){ cont.innerHTML='<div class="panel"><div class="msg err">Indica el período.</div></div>'; return; }

  if(MODO==='uno'){
    const emp=document.getElementById('sel-emp').value;
    if(!emp){ cont.innerHTML='<div class="panel"><div class="msg">Selecciona un colaborador.</div></div>'; return; }
    ULTIMA={modo:'uno', valor:emp, desde, hasta};
    cargarViaticosUno(emp,desde,hasta);
    cargarTxt(emp);
    cargarArt18(emp);
  }else{
    const area=document.getElementById('sel-area').value;
    if(!area){ cont.innerHTML='<div class="panel"><div class="msg">Selecciona un área.</div></div>'; return; }
    ULTIMA={modo:'area', valor:area, desde, hasta};
    cargarViaticosArea(area,desde,hasta);
    document.getElementById('res-txt').innerHTML=
      '<div class="panel"><div class="msg">El tiempo compensatorio se consulta por colaborador. '+
      'Cambia a <strong>Un colaborador</strong> para verlo.</div></div>';
    document.getElementById('res-art18').innerHTML='';
  }
}

/* ── Viáticos: un colaborador ── */
async function cargarViaticosUno(emp,desde,hasta){
  const cont=document.getElementById('res-via');
  cont.innerHTML='<div class="panel"><div class="msg"><span class="spin"></span> Calculando desde el registro biométrico…</div></div>';
  try{
    const url=`${GAS}?action=viaticos&token=${TOKEN}&employee=${encodeURIComponent(emp)}`+
              `&from=${desde}&to=${hasta}&_=${Date.now()}`;
    const r=await fetch(url); const d=await r.json();
    if(!d||!d.ok){ cont.innerHTML=`<div class="panel"><div class="msg err">${(d&&d.error)||'No se pudo generar el reporte.'}</div></div>`; return; }
    cont.innerHTML=pintarUno(d);
  }catch(e){
    cont.innerHTML='<div class="panel"><div class="msg err">Error de conexión. Intenta de nuevo.</div></div>';
  }
}

function pintarUno(d){
  const c=d.colaborador||{};
  if(!d.dias||!d.dias.length){
    return `<div class="panel">
      <div class="panel-h"><div class="panel-t">${c.nombre||''}</div></div>
      <div class="msg">No trabajó fuera de su horario regular en este período.</div></div>`;
  }
  const base=Math.min(...d.dias.map(x=>Number(x.alimentacion)||0).filter(v=>v>0));
  const filas=d.dias.map(x=>`
    <tr class="${Number(x.alimentacion)>base?'doble':''}">
      <td class="num">${fFecha(x.fecha)}</td>
      <td class="num">${fHora(x.entrada)}</td>
      <td class="num">${fHora(x.salida)}</td>
      <td class="num">${Number(x.alimentacion).toFixed(2)}</td>
      <td class="num">${Number(x.transporte).toFixed(2)}</td>
      <td class="num"><strong>${money(x.total_dia)}</strong></td>
    </tr>`).join('');

  return `
  <div class="kpis">
    <div class="kpi"><div class="kpi-l">Días reconocidos</div><div class="kpi-v">${d.dias.length}</div>
      <div class="kpi-s">fuera de horario regular</div></div>
    <div class="kpi"><div class="kpi-l">Alimentación</div><div class="kpi-v">${Number(d.subtotales.alimentacion).toFixed(2)}</div>
      <div class="kpi-s">balboas</div></div>
    <div class="kpi"><div class="kpi-l">Transporte</div><div class="kpi-v">${Number(d.subtotales.transporte).toFixed(2)}</div>
      <div class="kpi-s">balboas</div></div>
    <div class="kpi"><div class="kpi-l">Total a reconocer</div><div class="kpi-v">${Number(d.total).toFixed(2)}</div>
      <div class="kpi-s">balboas</div></div>
  </div>
  <div class="panel">
    <div class="panel-h">
      <div><div class="panel-t">${c.nombre||''}</div>
        <div class="kpi-s">${c.cedula||''} · ${c.cargo||''} · ${c.area||''}</div></div>
      <button class="btn btn-main" onclick="generarPdf(this)">Generar PDF</button>
    </div>
    <div style="padding:0">
      <table>
        <thead><tr><th>Fecha</th><th>Entrada</th><th>Salida</th>
          <th>Alimentación</th><th>Transporte</th><th>Total</th></tr></thead>
        <tbody>${filas}</tbody>
        <tfoot><tr><td colspan="3">Subtotales</td>
          <td class="num">${money(d.subtotales.alimentacion)}</td>
          <td class="num">${money(d.subtotales.transporte)}</td>
          <td class="num">${money(d.total)}</td></tr></tfoot>
      </table>
    </div>
  </div>
  <div class="kpi-s" style="padding:0 4px 10px">
    Las filas resaltadas son fin de semana o feriado (alimentación doble). ${d.periodo.texto}
  </div>`;
}

/* ── Viáticos: área completa ── */
async function cargarViaticosArea(area,desde,hasta){
  const cont=document.getElementById('res-via');
  cont.innerHTML='<div class="panel"><div class="msg"><span class="spin"></span> Calculando el área completa. Puede tardar un momento…</div></div>';
  try{
    const url=`${GAS}?action=viaticos_lote&token=${TOKEN}&area=${encodeURIComponent(area)}`+
              `&from=${desde}&to=${hasta}&_=${Date.now()}`;
    const r=await fetch(url); const d=await r.json();
    if(!d||!d.ok){ cont.innerHTML=`<div class="panel"><div class="msg err">${(d&&d.error)||'No se pudo calcular.'}</div></div>`; return; }
    cont.innerHTML=pintarArea(d);
  }catch(e){
    cont.innerHTML='<div class="panel"><div class="msg err">Error de conexión. Intenta de nuevo.</div></div>';
  }
}

function pintarArea(d){
  if(!d.reportes||!d.reportes.length){
    return `<div class="panel"><div class="msg">
      Nadie en ${d.area} trabajó fuera de su horario regular en este período.</div></div>`;
  }
  const items=d.reportes.slice().sort((a,b)=>Number(b.total)-Number(a.total))
    .map(r=>`<div class="lote-item">
      <div><div class="lote-n">${r.colaborador.nombre}</div>
        <div class="lote-d">${r.dias.length} día(s) · ${r.colaborador.cargo||''}</div></div>
      <div class="lote-t">${money(r.total)}</div></div>`).join('');

  return `
  <div class="kpis">
    <div class="kpi"><div class="kpi-l">Con reconocimiento</div><div class="kpi-v">${d.con_viaticos}</div>
      <div class="kpi-s">de ${d.personal_evaluado} en el área</div></div>
    <div class="kpi"><div class="kpi-l">Sin días fuera de horario</div><div class="kpi-v">${d.sin_viaticos}</div>
      <div class="kpi-s">no generan reporte</div></div>
    <div class="kpi"><div class="kpi-l">Total del área</div><div class="kpi-v">${Number(d.total_lote).toFixed(2)}</div>
      <div class="kpi-s">balboas</div></div>
  </div>
  <div class="panel">
    <div class="panel-h">
      <div><div class="panel-t">${d.area}</div><div class="kpi-s">${d.periodo.texto}</div></div>

    </div>

}

/* ── Bienvenida: resumen del ciclo vigente por área ── */
async function pintarBienvenida(){
  const cont=document.getElementById('res-via');
  const desde=document.getElementById('f-desde').value;
  const hasta=document.getElementById('f-hasta').value;
  const chip=document.querySelector('#chips .chip.on');
  const cicloTxt=chip?chip.textContent:'';

  cont.innerHTML=`
    <div class="panel">
      <div class="panel-b">
        <div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px">
          Ciclo ${cicloTxt}</div>
        <div class="kpi-s" style="margin-bottom:14px">
          Reconocimiento de alimentación y transporte del personal del almacén.
          Elige un colaborador o un área y pulsa Consultar.</div>
        ${window.__ULTIMA_MARCACION ? `<div class="aviso">
          El biométrico tiene marcaciones hasta el
          <strong>${fFecha(window.__ULTIMA_MARCACION)}</strong>.
          Los ciclos posteriores aparecerán vacíos hasta que se cargue un reporte nuevo.
        </div>` : ''}
        <div id="bienv-areas"><span class="spin"></span> Cargando resumen del ciclo…</div>
      </div>
    </div>`;

  // Resumen por área: cuántos generaron reconocimiento y cuánto suma
  try{
    const ra=await fetch(`${GAS}?action=areas&token=${TOKEN}&_=${Date.now()}`);
    const da=await ra.json();
    const areas=(da.areas||[]).slice(0,4);   // las de mayor personal
    if(!areas.length){ document.getElementById('bienv-areas').innerHTML=''; return; }

    const res=await Promise.all(areas.map(a=>
      fetch(`${GAS}?action=viaticos_lote&token=${TOKEN}&area=${encodeURIComponent(a.area)}`+
            `&from=${desde}&to=${hasta}&_=${Date.now()}`)
        .then(r=>r.json()).catch(()=>null)
    ));

    const tarjetas=res.map((d,i)=>{
      const a=areas[i];
      if(!d||!d.ok) return `<div class="kpi"><div class="kpi-l">${a.area}</div>
        <div class="kpi-v" style="font-size:16px">—</div>
        <div class="kpi-s">${a.personal} colaboradores</div></div>`;
      return `<div class="kpi" style="cursor:pointer" onclick="irAArea('${a.area}')">
        <div class="kpi-l">${a.area}</div>
        <div class="kpi-v">${Number(d.total_lote||0).toFixed(2)}</div>
        <div class="kpi-s">${d.con_viaticos} de ${d.personal_evaluado} · balboas</div></div>`;
    }).join('');

    document.getElementById('bienv-areas').innerHTML=
      `<div class="kpis" style="margin:0">${tarjetas}</div>
       <div class="kpi-s" style="margin-top:10px">Toca un área para ver su detalle.</div>`;
  }catch(e){
    document.getElementById('bienv-areas').innerHTML=
      '<div class="kpi-s">No se pudo cargar el resumen del ciclo.</div>';
  }
}

function irAArea(area){
  setModo('area');
  const sel=document.getElementById('sel-area');
  for(const o of sel.options){ if(o.value===area){ sel.value=area; break; } }
  consultar();
}

/* ── Tiempo compensatorio: libro por ciclo ── */
async function cargarTxt(emp){
  const cont=document.getElementById('res-txt');
  cont.innerHTML='<div class="panel"><div class="msg"><span class="spin"></span> Reconstruyendo el registro desde el biométrico…</div></div>';
  try{
    const url=`${GAS}?action=txt_libro&token=${TOKEN}&employee=${encodeURIComponent(emp)}&_=${Date.now()}`;
    const r=await fetch(url); const d=await r.json();
    if(!d||!d.ok){ cont.innerHTML=`<div class="panel"><div class="msg err">${(d&&d.error)||'No se pudo reconstruir el registro.'}</div></div>`; return; }
    cont.innerHTML=pintarTxt(d);
  }catch(e){
    cont.innerHTML='<div class="panel"><div class="msg err">Error de conexión. Intenta de nuevo.</div></div>';
  }
}

function pintarTxt(d){
  const movs=d.movimientos||[];
  if(!movs.length){
    return `<div class="panel"><div class="msg">
      Este colaborador no tiene movimientos de tiempo compensatorio registrados.</div></div>`;
  }

  const filas=movs.map(m=>`
    <tr class="${m.tipo==='APERTURA'?'apertura':''}">
      <td class="l">${m.periodo||''}</td>
      <td class="num">${m.generado_hhmm||'—'}</td>
      <td class="num">${m.tomado_hhmm||'—'}</td>
      <td class="num"><strong>${m.acumulado_hhmm||''}</strong></td>
      <td class="l" style="font-size:11.5px;color:var(--muted)">${m.observaciones||''}</td>
    </tr>`).join('');

  const alertaSobregiro = d.sobregiro
    ? `<div class="aviso" style="background:var(--bad-bg);border-color:#fca5a5;color:var(--bad)">
         El saldo está sobregirado: se ha tomado más tiempo del acumulado. Requiere revisión.
       </div>` : '';

  const empalmeActual = d.empalme_registrado
    ? `Registrado: <strong>${d.empalme_horas} h</strong> al ${fFecha(d.empalme_fecha_corte)}`
      + (d.empalme_registrado_por?` · por ${d.empalme_registrado_por}`:'')
    : 'Sin saldo previo registrado.';

  const bloqueEmpalme = `
  <div class="panel">
    <div class="panel-h">
      <div><div class="panel-t">Saldo previo al biométrico (empalme)</div>
        <div class="kpi-s">${empalmeActual}</div></div>
    </div>
    <div class="panel-b">
      <div class="aviso">
        El cálculo arranca desde septiembre de 2025, que es cuando el biométrico
        tiene datos. Si consta que el colaborador tenía horas acumuladas antes de
        esa fecha, regístralas aquí con su justificación.
      </div>
      <div class="row">
        <div class="fld">
          <label for="emp-horas">Horas previas</label>
          <input type="number" id="emp-horas" min="0" step="0.5" value="${d.empalme_horas||0}"
                 style="border:1px solid var(--line);border-radius:6px;padding:8px 10px;
                        font-family:inherit;font-size:13.5px;width:120px">
        </div>
        <div class="fld">
          <label for="emp-corte">Fecha de corte</label>
          <input type="date" id="emp-corte" value="${d.empalme_fecha_corte||'2025-09-15'}">
        </div>
        <div class="fld grow">
          <label for="emp-just">Justificación</label>
          <input type="text" id="emp-just" placeholder="Origen del saldo previo"
                 value="${(d.empalme_justificacion||'').replace(/"/g,'&quot;')}"
                 style="border:1px solid var(--line);border-radius:6px;padding:8px 10px;
                        font-family:inherit;font-size:13.5px;width:100%">
        </div>
        <div class="fld">
          <label for="emp-pin">PIN de autorización</label>
          <input type="password" id="emp-pin" placeholder="4 dígitos" maxlength="4"
                 inputmode="numeric" autocomplete="off"
                 style="border:1px solid var(--line);border-radius:6px;padding:8px 10px;
                        font-family:var(--mono);font-size:13.5px;width:120px;letter-spacing:3px">
        </div>
        <button class="btn btn-2" onclick="guardarEmpalme(this)">Guardar empalme</button>
      </div>
    </div>
  </div>`;

  return `
  ${alertaSobregiro}
  <div class="kpis">
    <div class="kpi"><div class="kpi-l">Saldo disponible</div>
      <div class="kpi-v" style="${d.sobregiro?'color:var(--bad)':''}">${d.saldo_actual_hhmm}</div>
      <div class="kpi-s">horas : minutos</div></div>
    <div class="kpi"><div class="kpi-l">Generado</div><div class="kpi-v">${d.total_generado_hhmm}</div>
      <div class="kpi-s">desde el biométrico</div></div>
    <div class="kpi"><div class="kpi-l">Tomado</div><div class="kpi-v">${d.total_tomado_hhmm}</div>
      <div class="kpi-s">usos aprobados</div></div>
    <div class="kpi"><div class="kpi-l">Horas extra pagadas</div><div class="kpi-v">${d.he_pagadas_hhmm}</div>
      <div class="kpi-s">B/. ${Number(d.he_monto_usd||0).toFixed(2)} · bolsón aparte</div></div>
  </div>

  <div class="panel">
    <div class="panel-h">
      <div><div class="panel-t">Registro de tiempo compensatorio</div>
        <div class="kpi-s">${d.employee} · un renglón por ciclo</div></div>
      <button class="btn btn-main" onclick="imprimirTxt(this)">Imprimir registro</button>

    <div style="padding:0">

async function imprimirTxt(btn){
  if(!EMP_ACTUAL) return;
  const t=btn.textContent; btn.disabled=true; btn.textContent='Generando…';
  try{
    const url=`${GAS}?action=txt_pdf&token=${TOKEN}&employee=${encodeURIComponent(EMP_ACTUAL)}&_=${Date.now()}`;
    const r=await fetch(url); const d=await r.json();
    if(d&&d.ok&&d.downloadUrl){ window.open(d.downloadUrl,'_blank'); }
    else{ alert((d&&d.error)||'No se pudo generar el documento.'); }
  }catch(e){ alert('Error de conexión al generar el documento.'); }
  btn.disabled=false; btn.textContent=t;
}

async function guardarEmpalme(btn){
  if(!EMP_ACTUAL) return;
  const horas=document.getElementById('emp-horas').value||0;
  const corte=document.getElementById('emp-corte').value||'2025-09-15';
  const just=document.getElementById('emp-just').value||'';
  const pin=document.getElementById('emp-pin').value||'';
  if(pin.length!==4){ alert('Ingresa tu PIN de 4 dígitos para autorizar.'); return; }
  const t=btn.textContent; btn.disabled=true; btn.textContent='Guardando…';
  try{
    const url=`${GAS}?action=empalme_guardar&token=${TOKEN}`+
      `&employee=${encodeURIComponent(EMP_ACTUAL)}&horas=${horas}&fecha_corte=${corte}`+
      `&justificacion=${encodeURIComponent(just)}&pin=${encodeURIComponent(pin)}&_=${Date.now()}`;
    const r=await fetch(url); const d=await r.json();
    if(d&&d.ok){ cargarTxt(EMP_ACTUAL); }
    else{ alert((d&&d.error)||'No se pudo guardar el empalme.'); }
  }catch(e){ alert('Error de conexión al guardar.'); }
  btn.disabled=false; btn.textContent=t;
}

/* ── Artículo 18: permisos anuales (bolsón editable) ── */

async function cargarArt18(emp){
  EMP_ACTUAL = emp;
  const cont=document.getElementById('res-art18');
  cont.innerHTML='<div class="panel"><div class="msg"><span class="spin"></span> Cargando permisos…</div></div>';
  try{
    const url=`${GAS}?action=art18&token=${TOKEN}&employee=${encodeURIComponent(emp)}&_=${Date.now()}`;
    const r=await fetch(url); const d=await r.json();
    if(!d||!d.ok){ cont.innerHTML=`<div class="panel"><div class="msg err">${(d&&d.error)||'No se pudieron cargar los permisos.'}</div></div>`; return; }
    cont.innerHTML=pintarArt18(d);
  }catch(e){
    cont.innerHTML='<div class="panel"><div class="msg err">Error de conexión al cargar los permisos.</div></div>';
  }
}

function pintarArt18(d){
  const hoy=new Date().toISOString().slice(0,10);
  const bloques=(d.bloques||[]).map(b=>{
    const permisos=(b.permisos||[]).map(x=>`
      <div class="lote-item">
        <div>
          <div class="lote-n">${x.horas} h · ${fFecha(x.fecha)}</div>
          <div class="lote-d">${x.autorizado_por?'Autorizó: '+x.autorizado_por:''}${x.nota?' · '+x.nota:''}</div>
        </div>
        <button class="btn btn-2" style="padding:5px 12px;font-size:12px"
          onclick="eliminarArt18('${x.id}')">Eliminar</button>
      </div>`).join('') ||
      '<div class="msg" style="padding:14px">Sin permisos registrados en este cuatrimestre.</div>';

    const color = b.excedido ? 'var(--bad)' : (b.horas_restantes===0 ? 'var(--warn)' : 'var(--ok)');
    return `
    <div class="panel">
      <div class="panel-h">
        <div>
          <div class="panel-t">${b.etiqueta}${b.es_actual?' · vigente':''}</div>
          <div class="kpi-s">${fFecha(b.desde)} a ${fFecha(b.hasta)}</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:${color}">
            ${b.horas_restantes} h</div>
          <div class="kpi-s">de ${b.horas_disponibles} h disponibles</div>
        </div>
      </div>
      <div>${permisos}</div>
      ${b.excedido?'<div class="aviso" style="background:var(--bad-bg);border-color:#fca5a5;color:var(--bad);margin:12px">Se excedió el límite de 8 horas de este cuatrimestre.</div>':''}
    </div>`;
  }).join('');

  return `
  <div class="panel">
    <div class="panel-h">
      <div><div class="panel-t">Artículo 18 · Permisos anuales</div>
        <div class="kpi-s">Hasta 8 horas cada 4 meses · 3 permisos al año</div></div>
    </div>
    <div class="panel-b">
      <div class="aviso">
        Este es un bolsón aparte del tiempo compensatorio: son permisos que autoriza
        el jefe inmediato, no horas generadas.
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid #bfd4ee;font-size:11.5px">
          <strong>Artículo 18 · Permisos anuales (RIP 2026):</strong>
          «Los jefes inmediatos podrán conceder permisos hasta por ocho (8) horas,
          cada cuatro (4) meses al año, a sus subalternos.»
          El reglamento añade: «En lo sucesivo serán 3 permisos en el año» y
          «por la aplicación de la ley en el tiempo, la periodicidad de los 4 meses
          inicia en mayo de 2026».
          <br><span style="color:var(--muted)">
          Sobre esa base, el sistema cuenta los cuatrimestres así: mayo–agosto,
          septiembre–diciembre y enero–abril. El reglamento fija el inicio en mayo
          pero no enumera los bloques; si la aplicación institucional difiere,
          debe ajustarse.</span>
        </div>
      </div>
      <div class="row">
        <div class="fld">
          <label for="a18-fecha">Fecha del permiso</label>
          <input type="date" id="a18-fecha" value="${hoy}">
        </div>
        <div class="fld">
          <label for="a18-horas">Horas</label>
          <input type="number" id="a18-horas" min="0.5" max="8" step="0.5" value="8"
                 style="border:1px solid var(--line);border-radius:6px;padding:8px 10px;
                        font-family:inherit;font-size:13.5px;width:110px">
        </div>
        <div class="fld">
          <label for="a18-pin">PIN de autorización</label>
          <input type="password" id="a18-pin" placeholder="4 dígitos" maxlength="4"
                 inputmode="numeric" autocomplete="off"
                 style="border:1px solid var(--line);border-radius:6px;padding:8px 10px;
                        font-family:var(--mono);font-size:13.5px;width:120px;letter-spacing:3px">
        </div>
        <div class="fld grow">
          <label for="a18-nota">Observación</label>
          <input type="text" id="a18-nota" placeholder="Opcional"
                 style="border:1px solid var(--line);border-radius:6px;padding:8px 10px;
                        font-family:inherit;font-size:13.5px;width:100%">
        </div>
        <button class="btn btn-main" onclick="registrarArt18(this)">Registrar permiso</button>
      </div>
    </div>
  </div>
  ${bloques}`;
}

async function registrarArt18(btn){
  if(!EMP_ACTUAL) return;
  const fecha=document.getElementById('a18-fecha').value;
  const horas=document.getElementById('a18-horas').value;
  const pin=document.getElementById('a18-pin').value||'';
  const nota=document.getElementById('a18-nota').value||'';
  if(!fecha||!horas){ alert('Indica la fecha y las horas del permiso.'); return; }
  if(pin.length!==4){ alert('Ingresa tu PIN de 4 dígitos para autorizar el registro.'); return; }

  const t=btn.textContent; btn.disabled=true; btn.textContent='Guardando…';
  try{
    const url=`${GAS}?action=art18_registrar&token=${TOKEN}`+
      `&employee=${encodeURIComponent(EMP_ACTUAL)}&fecha=${fecha}&horas=${horas}`+
      `&pin=${encodeURIComponent(pin)}&nota=${encodeURIComponent(nota)}&_=${Date.now()}`;
    const r=await fetch(url); const d=await r.json();
    if(d&&d.ok){ cargarArt18(EMP_ACTUAL); }
    else{ alert((d&&d.error)||'No se pudo registrar el permiso.'); }
  }catch(e){ alert('Error de conexión al registrar.'); }
  btn.disabled=false; btn.textContent=t;
}

async function eliminarArt18(id){
  const pin=prompt('Ingresa tu PIN de 4 dígitos para eliminar este permiso:');
  if(!pin) return;
  try{
    const url=`${GAS}?action=art18_eliminar&token=${TOKEN}&id=${encodeURIComponent(id)}`+
              `&employee=${encodeURIComponent(EMP_ACTUAL)}&pin=${encodeURIComponent(pin)}&_=${Date.now()}`;
    const r=await fetch(url); const d=await r.json();
    if(d&&d.ok){ cargarArt18(EMP_ACTUAL); }
    else{ alert((d&&d.error)||'No se pudo eliminar.'); }
  }catch(e){ alert('Error de conexión al eliminar.'); }
}

/* ── PDF (según modo) ── */
async function generarPdf(btn){
  if(!ULTIMA) return;
  const t=btn.textContent; btn.disabled=true; btn.textContent='Generando…';
  try{
    const url = (ULTIMA.modo==='uno')
      ? `${GAS}?action=viaticos_pdf&token=${TOKEN}&employee=${encodeURIComponent(ULTIMA.valor)}&from=${ULTIMA.desde}&to=${ULTIMA.hasta}&_=${Date.now()}`
      : `${GAS}?action=viaticos_lote_pdf&token=${TOKEN}&area=${encodeURIComponent(ULTIMA.valor)}&from=${ULTIMA.desde}&to=${ULTIMA.hasta}&_=${Date.now()}`;
    const r=await fetch(url); const d=await r.json();
    if(d&&d.ok&&d.downloadUrl){ window.open(d.downloadUrl,'_blank'); }
    else{ alert((d&&d.error)||'No se pudo generar el documento.'); }
  }catch(e){ alert('Error de conexión al generar el documento.'); }
  btn.disabled=false; btn.textContent=t;
}

/* ── Arranque ── */
pintarChips();
cargarPersonal();
cargarAreas();
arrancar();

// Preselecciona el último ciclo CON DATOS (el biométrico se alimenta por ingestas,
// así que el ciclo del calendario puede estar vacío) y avisa hasta dónde llega.
async function arrancar(){
  try{
    const r=await fetch(`${GAS}?action=ultimo_ciclo&token=${TOKEN}&_=${Date.now()}`);
    const d=await r.json();
    if(d&&d.ok&&d.ciclo){
      document.getElementById('f-desde').value=d.ciclo.from;
      document.getElementById('f-hasta').value=d.ciclo.to;
      // Marcar el chip correspondiente si está entre los visibles
      document.querySelectorAll('#chips .chip').forEach(b=>{
        b.classList.toggle('on', b.dataset.d===d.ciclo.from);
      });
      window.__ULTIMA_MARCACION = d.ciclo.ultima_marcacion || '';
    }
  }catch(e){ /* si falla, queda el ciclo del calendario */ }
  pintarBienvenida();
}
