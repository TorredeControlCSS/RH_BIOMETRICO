<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RH · Almacén CEDIS Panamá</title>
<link rel="icon" href="./favicon.ico">
<style>
:root{
  --navy:#0B1F3A; --blue:#0C447C; --blue-soft:#e8f0fa;
  --line:#c9d2dd; --line-soft:#e6ebf1;
  --bg:#f2f4f7; --white:#fff;
  --text:#1b2430; --muted:#6b7785;
  --ok:#166534; --ok-bg:#dcfce7;
  --warn:#92400e; --warn-bg:#fef3c7;
  --bad:#991b1b; --bad-bg:#fee2e2;
  --ff:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;
  --mono:'Consolas','SF Mono',monospace;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:var(--ff);color:var(--text);font-size:14px}

/* ── Barra superior ── */
.top{background:var(--navy);color:#fff;padding:11px 20px;display:flex;align-items:center;gap:14px;
     position:sticky;top:0;z-index:60;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.top img{width:42px;height:42px}
.top-t{font-size:15.5px;font-weight:700;line-height:1.2}
.top-s{font-size:11px;color:#b9c7d9;letter-spacing:.3px}
.top-r{font-family:var(--mono);font-size:12px;color:#b9c7d9}

/* ── Selector de contexto (persona + ciclo) ── */
.ctx{background:var(--white);border-bottom:1px solid var(--line);padding:14px 20px;
     position:sticky;top:58px;z-index:55}
.ctx-in{max-width:1180px;margin:0 auto}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
select,input[type=date]{border:1px solid var(--line);border-radius:6px;padding:8px 10px;
       font-family:inherit;font-size:13.5px;background:var(--white);color:var(--text);min-width:160px}
select:focus,input:focus{outline:2px solid var(--blue);outline-offset:-1px}
.grow{flex:1;min-width:230px}
.grow select{width:100%}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.chip{border:1px solid var(--line);background:var(--white);border-radius:20px;padding:5px 13px;
      font-size:12px;cursor:pointer;font-family:inherit;color:var(--muted)}
.chip:hover{border-color:var(--blue);color:var(--navy)}
.chip.on{background:var(--blue-soft);border-color:var(--blue);color:var(--navy);font-weight:700}

.btn{border:none;border-radius:6px;padding:9px 18px;font-family:inherit;font-size:13.5px;
     font-weight:700;cursor:pointer;white-space:nowrap}
.btn-main{background:var(--blue);color:#fff}
.btn-main:hover{background:var(--navy)}
.btn-2{background:var(--white);color:var(--navy);border:1px solid var(--line)}
.btn-2:hover{border-color:var(--blue)}
.btn:disabled{opacity:.5;cursor:default}

/* ── Secciones ── */
.secs{background:var(--white);border-bottom:1px solid var(--line);padding:0 20px;
      position:sticky;top:135px;z-index:50;overflow-x:auto}
.secs-in{max-width:1180px;margin:0 auto;display:flex;gap:2px}
.secs button{background:none;border:none;padding:12px 18px;font-family:inherit;font-size:13.5px;
             font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;
             white-space:nowrap;display:flex;align-items:center;gap:7px}
.secs button:hover{color:var(--navy)}
.secs button.on{color:var(--navy);border-bottom-color:var(--blue);background:var(--blue-soft)}
.badge{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:20px;
       background:var(--warn-bg);color:var(--warn);letter-spacing:.2px}

.wrap{max-width:1180px;margin:0 auto;padding:20px}
.sec{display:none}
.sec.on{display:block}

/* ── Panel ── */
.panel{background:var(--white);border:1px solid var(--line);border-radius:8px;margin-bottom:16px;
       box-shadow:0 1px 3px rgba(11,31,58,.06)}
.panel-h{padding:12px 16px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;
         justify-content:space-between;gap:12px;flex-wrap:wrap}
.panel-t{font-size:14px;font-weight:700;color:var(--navy)}
.panel-b{padding:16px}

/* ── KPIs ── */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:13px 15px;
     box-shadow:0 1px 3px rgba(11,31,58,.06)}
.kpi-l{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kpi-v{font-size:24px;font-weight:700;color:var(--navy);font-family:var(--mono);margin-top:3px}
.kpi-s{font-size:11.5px;color:var(--muted)}

/* ── Tabla ── */
table{width:100%;border-collapse:collapse}
th,td{border:1px solid var(--line-soft);padding:7px 9px;font-size:13px;text-align:center}
th{background:#f7f9fc;font-weight:700;color:var(--navy);font-size:11.5px;
   text-transform:uppercase;letter-spacing:.3px}
td.l{text-align:left}
td.num{font-family:var(--mono)}
tr.doble td{background:#fffbeb}
tr.aus td{background:#fee2e2}
tr.tar td{background:#fef3c7}
tr.apertura td{background:#f7f9fc;font-style:italic;color:var(--muted)}
tfoot td{background:#f7f9fc;font-weight:700}

.msg{padding:26px;text-align:center;color:var(--muted);font-size:13px}
.msg.err{color:var(--bad)}
.spin{display:inline-block;width:15px;height:15px;border:2px solid var(--line);
      border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}

.lote-item{display:flex;align-items:center;justify-content:space-between;gap:12px;
           padding:10px 14px;border-bottom:1px solid var(--line-soft)}
.lote-item:last-child{border-bottom:none}
.lote-n{font-weight:600}
.lote-d{font-size:11.5px;color:var(--muted)}
.lote-t{font-family:var(--mono);font-weight:700;color:var(--navy)}

.aviso{background:var(--blue-soft);border:1px solid #bfd4ee;border-radius:6px;
       padding:10px 14px;font-size:12.5px;color:var(--navy);margin-bottom:14px}

.modo{display:flex;gap:6px;margin-bottom:14px}
.modo button{border:1px solid var(--line);background:var(--white);border-radius:6px;padding:7px 15px;
             font-family:inherit;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer}
.modo button.on{background:var(--navy);color:#fff;border-color:var(--navy)}

@media(max-width:640px){
  .ctx{top:56px;padding:12px}
  .secs{top:auto;position:static}
  .wrap{padding:12px}
  th,td{padding:5px 6px;font-size:12px}
}
</style>
</head>
<body>

<div class="top">
  <img src="./icons/icon-192.png" alt="CSS">
  <div>
    <div class="top-t">Recursos Humanos · Almacén CEDIS Panamá</div>
    <div class="top-s">DIRECCIÓN NACIONAL DE LOGÍSTICA</div>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:14px">
    <button class="btn" id="btn-pub" onclick="publicarDatos(this)"
      style="background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);
             padding:7px 14px;font-size:12.5px"
      title="Recalcula y republica los datos del dashboard">Actualizar datos</button>
    <div class="top-r" id="reloj"></div>
  </div>
</div>

<!-- Contexto: a quién y de qué ciclo -->
<div class="ctx">
  <div class="ctx-in">
    <div class="modo">
      <button class="on" id="m-uno" onclick="setModo('uno')">Vista individual</button>
      <button id="m-area" onclick="setModo('area')">Vista por área</button>
    </div>
    <div class="row">
      <div class="fld grow" id="box-emp">
        <label for="sel-emp">Colaborador</label>
        <select id="sel-emp"><option value="">Cargando personal…</option></select>
      </div>
      <div class="fld grow" id="box-area" style="display:none">
        <label for="sel-area">Área</label>
        <select id="sel-area"><option value="">Cargando áreas…</option></select>
      </div>
      <div class="fld">
        <label for="f-desde">Desde</label>
        <input type="date" id="f-desde">
      </div>
      <div class="fld">
        <label for="f-hasta">Hasta</label>
        <input type="date" id="f-hasta">
      </div>
      <button class="btn btn-main" onclick="consultar()">Consultar</button>
      <button class="btn btn-2" onclick="limpiar()" title="Vuelve al inicio">Limpiar</button>
    </div>
    <div class="chips" id="chips"></div>
  </div>
</div>

<!-- Secciones -->
<nav class="secs">
  <div class="secs-in">
    <button class="on" id="s-asi" onclick="verSec('asi')">Registro de asistencia</button>
    <button id="s-via" onclick="verSec('via')">Alimentación y transporte</button>
    <button id="s-txt" onclick="verSec('txt')">Tiempo compensatorio</button>
    <button id="s-vac" onclick="verSec('vac')">Vacaciones</button>
    <button id="s-inc" onclick="verSec('inc')">Incidencias</button>
  </div>
</nav>

<div class="wrap">
  <div class="sec on" id="sec-asi">
    <div id="res-asi"></div>
  </div>

  <div class="sec" id="sec-via">
    <div id="res-via"></div>
  </div>

  <div class="sec" id="sec-txt">
    <div id="res-txt"><div class="panel"><div class="msg">
      Selecciona un colaborador y pulsa <strong>Consultar</strong>.
    </div></div></div>
    <div id="res-art18"></div>
  </div>

  <div class="sec" id="sec-vac">
    <div id="res-vac"><div class="panel"><div class="msg">
      Selecciona un colaborador y pulsa <strong>Consultar</strong>.
    </div></div></div>
  </div>

  <div class="sec" id="sec-inc">
    <div id="res-inc"><div class="panel"><div class="msg">
      Selecciona un colaborador y pulsa <strong>Consultar</strong>.
    </div></div></div>
  </div>
</div>

<script>
const GAS   = "https://script.google.com/macros/s/AKfycby_lXwc1VIzyj5qV2kxaZBzhiBiHQ3wPbRG3raRov_Ij2lFEtBnqTGb_1DmCglx37V_/exec";
const TOKEN = "RH_DINALOG";
// Datos precalculados publicados en GitHub Pages. Se leen del CDN en
// milisegundos; el GAS solo se usa para escrituras y consultas puntuales.
const RH_JSON  = "./rh_data.json";     // ciclo vigente
const RH_INDEX = "./rh_index.json";    // ciclos disponibles
let DATOS = null;          // ciclo cargado ahora mismo
const CACHE_CICLOS = {};   // {from: datosDelCiclo} — evita releer lo ya traído
let INDICE = null;         // lista de ciclos publicados

let MODO='uno';          // 'uno' | 'area'
let EMP_ACTUAL='';       // colaborador consultado
let ULTIMA=null;         // {modo, valor, desde, hasta}

/* ── Datos precalculados (CDN) ── */
// Devuelve los datos del ciclo pedido. Cada ciclo es un archivo propio
// (rh_2026-06-16.json); el vigente además está en rh_data.json.
async function cargarDatos(from){
  if(from && CACHE_CICLOS[from]) { DATOS=CACHE_CICLOS[from]; return DATOS; }
  if(!from && DATOS) return DATOS;

  const rutas = from ? [`./rh_${from}.json`, RH_JSON] : [RH_JSON];
  for(const ruta of rutas){
    try{
      const r=await fetch(`${ruta}?v=${Date.now()}`, {cache:'no-cache'});
      if(!r.ok) continue;
      const d=await r.json();
      // Si se pidió un ciclo concreto, solo sirve si el archivo es de ese ciclo
      if(from && d.ciclo && d.ciclo.from!==from) continue;
      if(d.ciclo) CACHE_CICLOS[d.ciclo.from]=d;
      DATOS=d;
      return d;
    }catch(e){ /* probar la siguiente ruta */ }
  }
  return null;
}

// Índice de ciclos publicados: para saber cuáles se pueden consultar rápido
async function cargarIndice(){
  if(INDICE) return INDICE;
  try{
    const r=await fetch(`${RH_INDEX}?v=${Date.now()}`, {cache:'no-cache'});
    if(!r.ok) return null;
    INDICE=await r.json();
    return INDICE;
  }catch(e){ return null; }
}



// Tras una escritura: la sección se refresca sola, pero el JSON publicado
// (que alimenta los totales del ciclo) queda igual hasta republicar.
function avisarPublicar(){
  let el=document.getElementById('aviso-pub');
  if(!el){
    el=document.createElement('div');
    el.id='aviso-pub';
    el.style.cssText='position:fixed;bottom:18px;right:18px;z-index:200;max-width:330px;'+
      'background:var(--navy);color:#fff;padding:12px 16px;border-radius:8px;'+
      'font-size:12.5px;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,.25)';
    document.body.appendChild(el);
  }
  el.innerHTML='Registro guardado. Para que los totales del ciclo lo reflejen, '+
    'pulsa <strong>Actualizar datos</strong> arriba cuando termines.'+
    '<div style="text-align:right;margin-top:8px">'+
    '<button onclick="this.closest(\'div\').parentNode.remove()" '+
    'style="background:none;border:1px solid rgba(255,255,255,.35);color:#fff;'+
    'border-radius:5px;padding:4px 12px;font-size:11.5px;cursor:pointer;font-family:inherit">'+
    'Entendido</button></div>';
  clearTimeout(window.__avisoT);
  window.__avisoT=setTimeout(()=>{ const e=document.getElementById('aviso-pub'); if(e) e.remove(); }, 12000);
}

/* ── Republicar datos (opción C: control explícito) ──
   Recalcula el ciclo y republica el JSON. Se usa tras registrar
   incidencias, permisos o resoluciones, para que el dashboard
   refleje los cambios sin esperar a nadie. */
async function publicarDatos(btn){
  const pin=prompt('Ingresa tu PIN de 4 dígitos para actualizar los datos del dashboard:');
  if(!pin) return;
  if(String(pin).replace(/\D/g,'').length!==4){ alert('El PIN debe tener 4 dígitos.'); return; }

  const t=btn.textContent; btn.disabled=true; btn.textContent='Actualizando…';
  try{
    const url=`${GAS}?action=publicar&token=${TOKEN}&pin=${encodeURIComponent(pin)}&_=${Date.now()}`;
    const r=await fetch(url); const d=await r.json();
    if(d&&d.ok){
      alert(`Datos actualizados por ${d.publicado_por}.\n`+
            `${d.colaboradores} colaboradores · ${d.kb} KB · ${d.segundos} s\n\n`+
            `El dashboard se recargará para mostrarlos.`);
      DATOS=null;                  // descartar el JSON viejo en memoria
      setTimeout(()=>location.reload(), 800);
      return;
    }
    alert((d&&d.error)||'No se pudo actualizar.');
  }catch(e){ alert('Error de conexión al actualizar.'); }
  btn.disabled=false; btn.textContent=t;
}

/* ── Reloj ── */
function reloj(){
  const d=new Date();
  document.getElementById('reloj').textContent =
    d.toLocaleDateString('es-PA',{day:'2-digit',month:'2-digit',year:'2-digit'})+' · '+
    d.toLocaleTimeString('es-PA',{hour:'2-digit',minute:'2-digit'});
}
setInterval(reloj,30000); reloj();

/* ── Modo: un colaborador o un área ── */
function setModo(m){
  MODO=m;
  document.getElementById('m-uno').classList.toggle('on', m==='uno');
  document.getElementById('m-area').classList.toggle('on', m==='area');
  document.getElementById('box-emp').style.display  = (m==='uno')  ? '' : 'none';
  document.getElementById('box-area').style.display = (m==='area') ? '' : 'none';
}

/* ── Secciones ── */
function verSec(s){
  ['asi','via','txt','vac','inc'].forEach(x=>{
    document.getElementById('sec-'+x).classList.toggle('on', x===s);
    document.getElementById('s-'+x).classList.toggle('on', x===s);
  });
}

/* ── Ciclos 16→15 ── */
function iso(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function ciclos(n){
  const out=[]; const hoy=new Date();
  let y=hoy.getFullYear(), m=hoy.getMonth();
  if(hoy.getDate()<16) m--;
  for(let i=0;i<n;i++){
    const ini=new Date(y,m-i,16), fin=new Date(y,m-i+1,15);
    out.push({desde:iso(ini), hasta:iso(fin),
      etiqueta: ini.toLocaleDateString('es-PA',{month:'short'}).replace('.','')+' 16 – '+
                fin.toLocaleDateString('es-PA',{month:'short'}).replace('.','')+' 15'});
  }
  return out;
}
// Los ciclos con datos publicados responden al instante; los demas se
// calculan en vivo. Se marcan para que el usuario sepa que esperar.
async function marcarChipsPublicados(){
  const idx=await cargarIndice();
  if(!idx||!idx.ciclos) return;
  const pub={}; idx.ciclos.forEach(function(c){ pub[c.from]=true; });
  document.querySelectorAll("#chips .chip").forEach(function(b){
    if(pub[b.dataset.d]){ b.title="Datos publicados \u00b7 consulta inmediata"; }
    else{ b.style.opacity=".62"; b.title="Sin publicar \u00b7 se calcula en vivo y puede tardar"; }
  });
}

function pintarChips(){
  const cont=document.getElementById('chips'), cs=ciclos(6);
  cont.innerHTML=cs.map((c,i)=>
    `<button class="chip" data-d="${c.desde}" data-h="${c.hasta}">${c.etiqueta}</button>`).join('');
  cont.querySelectorAll('.chip').forEach(b=>{
    b.onclick=()=>{
      cont.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      document.getElementById('f-desde').value=b.dataset.d;
      document.getElementById('f-hasta').value=b.dataset.h;
    };
  });
  // El ciclo en curso casi nunca tiene el mes completo cargado; se arranca en
  // el último ciclo YA CERRADO, que es sobre el que se preparan los reportes.
  const hoy=new Date();
  const enCurso = hoy.getDate()>=16;   // si es >=16, cs[0] es el ciclo que apenas abrió
  const idx = (enCurso && cs.length>1) ? 1 : 0;
  const sel = cs[idx];
  cont.querySelectorAll('.chip')[idx].classList.add('on');
  document.getElementById('f-desde').value=sel.desde;
  document.getElementById('f-hasta').value=sel.hasta;
  marcarChipsPublicados();
}

/* ── Catálogos ── */
// Si el backend no responde con lo esperado, se muestra el motivo en pantalla
// en vez de dejar el desplegable vacío sin explicación.
function avisoConexion(txt){
  let el=document.getElementById('aviso-conn');
  if(!el){
    el=document.createElement('div');
    el.id='aviso-conn';
    el.style.cssText='background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;'+
      'padding:10px 14px;border-radius:6px;font-size:12.5px;margin-top:10px';
    document.querySelector('.ctx-in').appendChild(el);
  }
  el.textContent=txt;
}

async function cargarPersonal(){
  const sel=document.getElementById('sel-emp');
  try{
    const r=await fetch(`${GAS}?action=meta&token=${TOKEN}&_=${Date.now()}`);
    const d=await r.json();
    let emps = d.employees || d.empleados || d.personal || [];
    emps = emps.filter(e=>e && String(e).trim() && String(e).toUpperCase()!=='TODOS')
               .map(String).sort();
    if(!emps.length){
      sel.innerHTML='<option value="">Sin personal disponible</option>';
      avisoConexion('El servidor respondió pero no devolvió personal. Verifica que MATRIZ_ALIAS tenga registros activos.');
      return;
    }
    sel.innerHTML='<option value="">Selecciona un colaborador…</option>'+
      emps.map(e=>`<option value="${e}">${e}</option>`).join('');
  }catch(e){
    sel.innerHTML='<option value="">No se pudo cargar el personal</option>';
    avisoConexion('No se pudo conectar con el servidor. Revisa que el script esté desplegado y que la dirección del despliegue coincida con la de esta página.');
  }
}
async function cargarAreas(){
  const sel=document.getElementById('sel-area');
  try{
    const r=await fetch(`${GAS}?action=areas&token=${TOKEN}&_=${Date.now()}`);
    const d=await r.json();
    const as=d.areas||[];
    if(!as.length){
      sel.innerHTML='<option value="">Sin áreas disponibles</option>';
      return;
    }
    sel.innerHTML='<option value="">Selecciona un área…</option>'+
      as.map(a=>`<option value="${a.area}">${a.area} (${a.personal})</option>`).join('');
  }catch(e){
    sel.innerHTML='<option value="">No se pudieron cargar las áreas</option>';
  }
}

/* ── Formatos ── */
// El biométrico guarda las horas como fecha base 1899; se muestra solo la hora.
function limpiarDetalle(t){
  return String(t||'').replace(/\w{3}\s+\w{3}\s+\d{1,2}\s+\d{4}\s+(\d{1,2}:\d{2}):\d{2}[^·]*/g,'$1');
}
const money  = n => 'B/. '+Number(n||0).toFixed(2);
const fFecha = ymd => { const p=String(ymd||'').split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:ymd; };
const fHora  = h => {
  const s=String(h||'').trim();
  // Sheets devuelve las horas sueltas como fecha base 1899 ("Sat Dec 30 1899 07:37:00 GMT...").
  // Se extrae solo la hora para no mostrar esa fecha falsa.
  const g=s.match(/(\d{1,2}):(\d{2})(?::\d{2})?/);
  return g?`${+g[1]}:${g[2]}`:s;
};


/* ── Limpiar: vuelve al estado inicial ── */
function limpiar(){
  // Selectores
  const se=document.getElementById('sel-emp'); if(se) se.value='';
  const sa=document.getElementById('sel-area'); if(sa) sa.value='';
  setModo('uno');

  // Ciclo por defecto (el último cerrado)
  pintarChips();

  // Contenidos de cada sección
  const vacio='<div class="panel"><div class="msg">'+

/* ── Consultar (según modo) ── */
function consultar(){
  const desde=document.getElementById('f-desde').value;
  const hasta=document.getElementById('f-hasta').value;
  const cont=document.getElementById('res-via');
  if(!desde||!hasta){ cont.innerHTML='<div class="panel"><div class="msg err">Indica el período.</div></div>'; return; }

  if(MODO==='uno'){
    const emp=document.getElementById('sel-emp').value;
    if(!emp){ cont.innerHTML='<div class="panel"><div class="msg">Selecciona un colaborador.</div></div>'; return; }
    ULTIMA={modo:'uno', valor:emp, desde, hasta};
    cargarRegistroAsistencia(emp,desde,hasta);
    cargarViaticosUno(emp,desde,hasta);
    cargarTxt(emp);
    cargarArt18(emp);
    cargarVacaciones(emp);
    cargarIncidencias(emp,desde,hasta);
  }else{
    const area=document.getElementById('sel-area').value;
    if(!area){ cont.innerHTML='<div class="panel"><div class="msg">Selecciona un área.</div></div>'; return; }
    ULTIMA={modo:'area', valor:area, desde, hasta};
    cargarViaticosArea(area,desde,hasta);
    cargarRegistroAsistenciaArea(area,desde,hasta);
    cargarTxtArea(area);
    cargarVacacionesArea(area);
    cargarAsistenciaArea(area,desde,hasta);
    document.getElementById('res-art18').innerHTML='';
  }
}

  const D=await cargarDatos(desde);

/* ── Viáticos: área completa ── */
async function cargarViaticosArea(area,desde,hasta){
  const cont=document.getElementById('res-via');

  // Del archivo del ciclo consultado
  const D=await cargarDatos(desde);
  if(D && D.ciclo && D.ciclo.from===desde && D.ciclo.to===hasta){
    const info=(D.areas||[]).filter(a=>a.area.toUpperCase()===area.toUpperCase())[0]||{};
    const reportes=Object.keys(D.colaboradores)
      .filter(n=>String(D.area_de[n]||'').toUpperCase()===area.toUpperCase())
      .map(n=>D.colaboradores[n]);
    cont.innerHTML=pintarArea({
      ok:true, area:area, periodo:D.ciclo,
      con_viaticos:reportes.length,
      sin_viaticos:(info.personal||0)-reportes.length,
      personal_evaluado:info.personal||0,
      total_lote:info.total||0,
      reportes:reportes
    });
    return;
  }

  cont.innerHTML='<div class="panel"><div class="msg"><span class="spin"></span> Calculando el área completa. Puede tardar un momento…</div></div>';
  try{
    const url=`${GAS}?action=viaticos_lote&token=${TOKEN}&area=${encodeURIComponent(area)}`+
              `&from=${desde}&to=${hasta}&_=${Date.now()}`;
    const r=await fetch(url); const d=await r.json();
    if(!d||!d.ok){ cont.innerHTML=`<div class="panel"><div class="msg err">${(d&&d.error)||'No se pudo calcular.'}</div></div>`; return; }
    cont.innerHTML=pintarArea(d);
  }catch(e){
    cont.innerHTML='<div class="panel"><div class="msg err">Error de conexión. Intenta de nuevo.</div></div>';
  }
}

/* ── Bienvenida: resumen del ciclo vigente por área ── */
async function pintarBienvenida(){
  const cont=document.getElementById('res-asi');
  const desde=document.getElementById('f-desde').value;
  const hasta=document.getElementById('f-hasta').value;
  const chip=document.querySelector('#chips .chip.on');
  const cicloTxt=chip?chip.textContent:'';

  cont.innerHTML=`
    <div class="panel">
      <div class="panel-b">
        <div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px">
          Ciclo ${cicloTxt}</div>
        <div class="kpi-s" style="margin-bottom:14px">
          Reconocimiento de alimentación y transporte del personal del almacén.
          Elige un colaborador o un área y pulsa Consultar.</div>
        ${window.__ULTIMA_MARCACION ? `<div class="aviso">
          El biométrico tiene marcaciones hasta el
          <strong>${fFecha(window.__ULTIMA_MARCACION)}</strong>.
          Los ciclos posteriores aparecerán vacíos hasta que se cargue un reporte nuevo.
        </div>` : ''}
        <div id="bienv-areas"><span class="spin"></span> Cargando resumen del ciclo…</div>
      </div>
    </div>`;

  // Los datos vienen del JSON publicado en GitHub Pages (CDN, milisegundos).
  // Si aún no se ha publicado, se calcula en vivo contra el script (lento).
  try{
    const D=await cargarDatos(desde);
    if(D&&D.areas&&D.areas.length){
      window.__ULTIMA_MARCACION=(D.ciclo&&D.ciclo.ultima_marcacion)||'';
      const tj=D.areas.map(a=>`
        <div class="kpi" style="cursor:pointer" onclick="irAArea('${a.area}')">
          <div class="kpi-l">${a.area}</div>
          <div class="kpi-v">${Number(a.total||0).toFixed(2)}</div>
          <div class="kpi-s">${a.con_viaticos} de ${a.personal} colaboradores</div></div>`).join('');
      document.getElementById('bienv-areas').innerHTML=
        `<div class="kpis" style="margin:0">${tj}</div>
         <div class="kpi-s" style="margin-top:10px">Toca un área para ver su detalle.${
           D.generado_en?` · Datos calculados el ${D.generado_en}`:''}</div>`;
      return;
    }

    document.getElementById('bienv-areas').innerHTML=
      '<div class="aviso" style="background:var(--warn-bg);border-color:#fcd34d;color:var(--warn)">'+
      'No hay datos publicados. Ejecuta <strong>PUBLICAR_RH_JSON</strong> en el script '+
      'para que las consultas sean inmediatas.</div><div><span class="spin"></span> Calculando en vivo…</div>';

    const ra=await fetch(`${GAS}?action=areas&token=${TOKEN}&_=${Date.now()}`);
    const da=await ra.json();
    const areas=(da.areas||[]);
    if(!areas.length){ document.getElementById('bienv-areas').innerHTML=''; return; }

    const conCorte=(url,ms)=>{
      const ctrl=new AbortController();
      const t=setTimeout(()=>ctrl.abort(), ms);
      return fetch(url,{signal:ctrl.signal})
        .then(r=>{ clearTimeout(t); return r.json(); })
        .catch(()=>null);
    };

    const res=await Promise.all(areas.map(a=>
      conCorte(`${GAS}?action=viaticos_lote&token=${TOKEN}&area=${encodeURIComponent(a.area)}`+
               `&from=${desde}&to=${hasta}&_=${Date.now()}`, 20000)
    ));

    const tarjetas=res.map((d,i)=>{
      const a=areas[i];
      if(!d||!d.ok) return `<div class="kpi"><div class="kpi-l">${a.area}</div>
        <div class="kpi-v" style="font-size:16px">—</div>
        <div class="kpi-s">${a.personal} colaboradores</div></div>`;
      return `<div class="kpi" style="cursor:pointer" onclick="irAArea('${a.area}')">
        <div class="kpi-l">${a.area}</div>
        <div class="kpi-v">${Number(d.total_lote||0).toFixed(2)}</div>
        <div class="kpi-s">${d.con_viaticos} de ${d.personal_evaluado} colaboradores</div></div>`;
    }).join('');

    document.getElementById('bienv-areas').innerHTML=
      `<div class="kpis" style="margin:0">${tarjetas}</div>
       <div class="kpi-s" style="margin-top:10px">Toca un área para ver su detalle.</div>`;
  }catch(e){
    document.getElementById('bienv-areas').innerHTML=
      '<div class="kpi-s">No se pudo cargar el resumen del ciclo.</div>';
  }
}

function irAArea(area){
  setModo('area');
  const sel=document.getElementById('sel-area');
  for(const o of sel.options){ if(o.value===area){ sel.value=area; break; } }
  consultar();
}

function pintarIncidencias(d){
  const items=d.incidencias||[];

    if(u.includes('AUSEN')) return 'var(--bad)';
    if(u.includes('TARDAN')) return 'var(--warn)';
    return 'var(--blue)';

  const kpis=Object.keys(d.por_tipo||{}).slice(0,4).map(k=>`
    <div class="kpi"><div class="kpi-l">${k}</div>
      <div class="kpi-v" style="color:${colorTipo(k)}">${d.por_tipo[k]}</div>

      <td class="l" style="font-size:11.5px;color:var(--muted)">${x.origen||''}</td>

  return `
  <div class="kpis">
    <div class="kpi"><div class="kpi-l">Total</div><div class="kpi-v">${d.total}</div>
      <div class="kpi-s">incidencias</div></div>

    <div class="panel-h">
      <div><div class="panel-t">Registro de incidencias</div>
        <div class="kpi-s">${d.employee} · del ${fFecha(d.periodo.desde)} al ${fFecha(d.periodo.hasta)}</div></div>

        <thead><tr><th>Fecha</th><th style="text-align:left">Tipo</th>
          <th style="text-align:left">Detalle</th><th style="text-align:left">Origen</th></tr></thead>

/* ── Generación de documentos ──
   Los navegadores bloquean window.open si ocurre tras una espera (async).
   Se abre la pestaña ANTES de la petición y luego se le pone la URL, que es
   lo que el navegador sí permite. Mientras tanto se muestra un aviso. */
function overlayReporte(mostrar, texto){
  let el=document.getElementById('ov-reporte');
  if(!mostrar){ if(el) el.remove(); return; }
  if(el){ el.querySelector('.ov-t').textContent=texto||'Generando reporte…'; return; }
  el=document.createElement('div');
  el.id='ov-reporte';
  el.style.cssText='position:fixed;inset:0;z-index:300;background:rgba(11,31,58,.82);'+
    'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#fff';
  el.innerHTML=
    '<img src="./icons/icon-192.png" alt="CSS" style="width:80px;height:80px">'+
    '<div class="ov-t" style="font-size:15px;font-weight:600">'+(texto||'Generando reporte…')+'</div>'+
    '<div style="font-size:12.5px;color:#b9c7d9;max-width:330px;text-align:center;line-height:1.6">'+
    'El documento se abrirá en una pestaña nueva. Si el navegador la bloquea, '+
    'permite las ventanas emergentes de este sitio.</div>'+
    '<div style="width:26px;height:26px;border:3px solid rgba(255,255,255,.25);'+
    'border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite"></div>';
  document.body.appendChild(el);
}

// Pide el documento y lo abre sin que el navegador lo bloquee
async function generarDocumento(url, etiqueta){
  const tab = window.open('', '_blank');       // se abre YA, con el clic aún vigente
  // Una pestaña en blanco desconcierta: se le escribe un aviso mientras
  // el documento se genera del lado del servidor.
  if(tab && !tab.closed){
    try{
      tab.document.write(
        '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Generando documento…</title>'+
        '<style>body{margin:0;min-height:100vh;display:flex;flex-direction:column;'+
        'align-items:center;justify-content:center;gap:18px;background:#0B1F3A;color:#fff;'+
        'font-family:Segoe UI,system-ui,Arial,sans-serif}'+
        '.sp{width:26px;height:26px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;'+
        'border-radius:50%;animation:r .8s linear infinite}'+
        '@keyframes r{to{transform:rotate(360deg)}}'+
        '.t{font-size:15px;font-weight:600}.s{font-size:12.5px;color:#b9c7d9;max-width:330px;'+
        'text-align:center;line-height:1.6}</style></head><body>'+
        '<img src="'+location.origin+location.pathname.replace(/[^/]*$/,'')+'icons/icon-192.png" '+
        'style="width:80px;height:80px" alt="CSS">'+
        '<div class="t">'+(etiqueta||'Generando documento…')+'</div>'+
        '<div class="sp"></div>'+
        '<div class="s">El documento se abrirá aquí en unos segundos. '+
        'No cierres esta pestaña.</div></body></html>');
      tab.document.close();
    }catch(e){ /* si el navegador no lo permite, queda en blanco */ }
  }
  overlayReporte(true, etiqueta||'Generando reporte…');
  try{
    const r=await fetch(url); const d=await r.json();
    overlayReporte(false);
    if(d&&d.ok&&d.downloadUrl){
      if(tab && !tab.closed){ tab.location.href=d.downloadUrl; }
      else{ window.open(d.downloadUrl,'_blank'); }   // por si la bloquearon igual
      return true;
    }
    if(tab && !tab.closed) tab.close();
    alert((d&&d.error)||'No se pudo generar el documento.');
  }catch(e){
    overlayReporte(false);
    if(tab && !tab.closed) tab.close();
    alert('Error de conexión al generar el documento.');
  }
  return false;
}

ajustarCicloConDatos(); // en segundo plano: si responde, corrige el ciclo

// El biométrico se alimenta por ingestas, así que el ciclo del calendario
// puede estar vacío. Esta consulta ajusta al último ciclo CON datos, pero
// nunca bloquea la pantalla: si tarda o falla, se queda el ciclo por defecto.
async function ajustarCicloConDatos(){
  try{
    // Primero el JSON publicado: trae el ciclo sin consultar el script
    let ciclo=null;
    const D=await cargarDatos();
    if(D&&D.ciclo){ ciclo=D.ciclo; }
    else{
      const ctrl=new AbortController();
      const corte=setTimeout(()=>ctrl.abort(), 8000);
      const r=await fetch(`${GAS}?action=ultimo_ciclo&token=${TOKEN}&_=${Date.now()}`,
                          {signal:ctrl.signal});
      clearTimeout(corte);
      const d=await r.json();
      if(!d||!d.ok||!d.ciclo) return;
      ciclo=d.ciclo;
    }
    const d={ok:true, ciclo:ciclo};

    window.__ULTIMA_MARCACION = d.ciclo.ultima_marcacion || '';

    // Si el ciclo por defecto ya es el correcto, no repintar
    if(document.getElementById('f-desde').value===d.ciclo.from){
      pintarBienvenida();   // solo para mostrar el aviso de hasta dónde hay datos
      return;
    }
    document.getElementById('f-desde').value=d.ciclo.from;
    document.getElementById('f-hasta').value=d.ciclo.to;
    document.querySelectorAll('#chips .chip').forEach(b=>{
      b.classList.toggle('on', b.dataset.d===d.ciclo.from);
    });
    pintarBienvenida();
  }catch(e){ /* la pantalla ya está pintada: no hacer nada */ }
}
</script>
</body>
</html>
